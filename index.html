<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/ical.js@5.0.0/build/ical.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-align: center;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .calendars {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .calendar-column {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .calendar-header {
            padding: 25px;
            font-size: 1.5em;
            font-weight: 600;
            border-bottom: 2px solid #f0f0f0;
        }

        .icloud .calendar-header {
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .outlook .calendar-header {
            background: #0078d4;
            color: white;
        }

        .events-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .event {
            padding: 18px 25px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s ease;
        }

        .event:hover {
            background: #f9f9f9;
        }

        .event-details {
            flex: 1;
        }

        .event-title {
            font-weight: 500;
            font-size: 1.05em;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .event-time {
            font-size: 0.9em;
            color: #666;
        }

        .no-events {
            padding: 40px 25px;
            text-align: center;
            color: #999;
            font-size: 1em;
        }

        .loading {
            padding: 40px 25px;
            text-align: center;
            color: #999;
        }

        .error {
            padding: 25px;
            background: #fee;
            color: #c33;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.95em;
        }

        .weather-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .weather-temp {
            font-size: 3em;
            font-weight: 600;
            color: #1d1d1f;
        }

        .weather-desc {
            font-size: 1.1em;
            color: #666;
            margin-top: 10px;
        }

        @media (max-width: 1024px) {
            .calendars {
                grid-template-columns: 1fr;
            }
        }

        .refresh-info {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Next 24 Hours</h1>
        <p class="subtitle" id="time-range"></p>

        <div class="calendars">
            <div class="calendar-column icloud">
                <div class="calendar-header">iCloud Calendar</div>
                <div class="events-list" id="icloud-events">
                    <div class="loading">Loading calendar...</div>
                </div>
            </div>

            <div class="calendar-column outlook">
                <div class="calendar-header">Outlook Calendar</div>
                <div class="events-list" id="outlook-events">
                    <div class="loading">Loading calendar...</div>
                </div>
            </div>
        </div>

        <p class="refresh-info">Refresh the page to update • Last updated: <span id="last-updated">—</span></p>
    </div>

    <script>
        // Calendar URLs with CORS proxy
        const CORS_PROXY = 'https://cors.isomorphic.sh/';
        const ICAL_URL = CORS_PROXY + 'https://p180-caldav.icloud.com/published/2/MTk0NzI4NjAwOTE5NDcyOE04aK5jrNjz4lTWY80bIBlAV1t_S6JaPLIfLw1ovw7_Xw6VQY64lYdPtNNMdoa0Wk6yDr88WmbcIfBdPEbF9Bo';
        const OUTLOOK_URL = CORS_PROXY + 'https://outlook.office365.com/owa/calendar/89eaccad27ab49d7a9fc9451c2979107@ey.com/9b52f874c4cc460b946d931b9c2c31a713803931116554866761/S-1-8-1301854537-2737744319-3037359986-1614808387/reachcalendar.ics';

        // Update time range display
        function updateTimeRange() {
            const now = new Date();
            const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            
            const formatter = new Intl.DateTimeFormat('en-US', { 
                month: 'short', 
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit',
                meridiem: 'short'
            });
            
            const nowStr = formatter.format(now);
            const tomorrowStr = formatter.format(tomorrow);
            
            document.getElementById('time-range').textContent = `${nowStr} → ${tomorrowStr}`;
        }

        // Fetch and parse calendar
        async function fetchCalendar(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                return text;
            } catch (error) {
                console.error('Calendar fetch error:', error);
                throw error;
            }
        }

        // Parse iCal and extract events for next 24 hours
        function getNext24HoursEvents(icalText) {
            const jcal = ICAL.parse(icalText);
            const comp = new ICAL.Component(jcal);
            const events = comp.getAllSubcomponents('vevent');
            
            const now = new Date();
            const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            
            const validEvents = events
                .map(event => {
                    const summary = event.getFirstPropertyValue('summary') || '(No title)';
                    const dtstart = event.getFirstPropertyValue('dtstart');
                    const dtend = event.getFirstPropertyValue('dtend');
                    
                    if (!dtstart) return null;
                    
                    const startDate = dtstart.toJSDate ? dtstart.toJSDate() : new Date(dtstart);
                    const endDate = dtend && dtend.toJSDate ? dtend.toJSDate() : new Date(dtend);
                    
                    // Check if event is within next 24 hours
                    if (startDate >= now && startDate < tomorrow) {
                        return { summary, startDate, endDate };
                    }
                    
                    // Also include events that started before now but end within 24 hours
                    if (startDate < now && endDate > now) {
                        return { summary, startDate, endDate };
                    }
                    
                    return null;
                })
                .filter(e => e !== null)
                .sort((a, b) => a.startDate - b.startDate);
            
            return validEvents;
        }

        // Format time
        function formatTime(date) {
            return new Intl.DateTimeFormat('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                meridiem: 'short'
            }).format(date);
        }

        // Render events
        function renderEvents(events, containerId) {
            const container = document.getElementById(containerId);
            
            if (events.length === 0) {
                container.innerHTML = '<div class="no-events">No events in the next 24 hours</div>';
                return;
            }
            
            container.innerHTML = events.map(event => `
                <div class="event">
                    <div class="event-details">
                        <div class="event-title">${escapeHtml(event.summary)}</div>
                        <div class="event-time">${formatTime(event.startDate)} – ${formatTime(event.endDate)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Escape HTML
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Main load function
        async function loadCalendars() {
            try {
                updateTimeRange();
                
                const [icloudText, outlookText] = await Promise.all([
                    fetchCalendar(ICAL_URL),
                    fetchCalendar(OUTLOOK_URL)
                ]);
                
                const icloudEvents = getNext24HoursEvents(icloudText);
                const outlookEvents = getNext24HoursEvents(outlookText);
                
                renderEvents(icloudEvents, 'icloud-events');
                renderEvents(outlookEvents, 'outlook-events');
                
                // Update last updated time
                const now = new Date();
                const timeStr = new Intl.DateTimeFormat('en-US', {
                    hour: 'numeric',
                    minute: '2-digit',
                    second: '2-digit',
                    meridiem: 'short'
                }).format(now);
                document.getElementById('last-updated').textContent = timeStr;
                
            } catch (error) {
                console.error('Error loading calendars:', error);
                document.getElementById('icloud-events').innerHTML = `
                    <div class="error">Failed to load iCloud calendar. Check the console for details.</div>
                `;
                document.getElementById('outlook-events').innerHTML = `
                    <div class="error">Failed to load Outlook calendar. Check the console for details.</div>
                `;
            }
        }

        // Load on page load
        loadCalendars();

        // Refresh every 5 minutes
        setInterval(loadCalendars, 5 * 60 * 1000);
    </script>
</body>
</html>
